services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pizza_study_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pizza_study
    ports:
      - "5432:5432"
    volumes:
      - pizza_study_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pizza_study"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pizza_study_data:
